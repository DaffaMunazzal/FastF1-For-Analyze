<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Data Analytics</title>
    
    <link rel="stylesheet" href="style.css">
</head><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

    <header class="dashboard-header">
        <h1>Formula 1 Driver Database</h1>
        <p>Dashboard Analytics Formula 1 Data (Live from Local API)</p>
    </header>

    <main id="driver-board" class="driver-grid">
        </main>
        
    <section class="chart-section">
     <h2>Pace Comparison (Top 3 Finishers)</h2>
     <figure class="chart-container">
         <canvas id="lapChart"></canvas>
         <figcaption>Grafik fluktuasi waktu putaran (dalam detik) pada GP Bahrain 2024.</figcaption>
     </figure>
     
 </section>
    <script>
        
        // JAVASCRIPT UNTUK GRAFIK LAP TIMES
     const chartUrl = 'http://127.0.0.1:5000/api/laptimes';
     const ctx = document.getElementById('lapChart').getContext('2d');

     fetch(chartUrl)
         .then(response => response.json())
         .then(data => {
             if(data.status === 'success') {
                 new Chart(ctx, {
                     type: 'line',
                     data: {
                         labels: data.laps, // Sumbu X (Lap 1, 2, 3...)
                         datasets: data.datasets // Garis pembalap dan warnanya
                     },
                     options: {
                         responsive: true,
                         plugins: {
                             legend: { labels: { color: '#ffffff' } }
                         },
                         scales: {
                             y: {
                                 title: { display: true, text: 'Lap Time (Detik)', color: '#a0a0b5' },
                                 ticks: { color: '#a0a0b5' }
                             },
                             x: {
                                 title: { display: true, text: 'Lap Number', color: '#a0a0b5' },
                                 ticks: { color: '#a0a0b5' }
                             }
                         }
                     }
                 });
             }
         })
         .catch(error => console.error('Error memuat grafik:', error));

        const apiUrl = 'http://127.0.0.1:5000/api/drivers';
        const driverBoard = document.getElementById('driver-board');

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                data.data.forEach(driver => {
                    
                    const card = document.createElement('article');
                    // Menambahkan nama class agar desain dari style.css bisa masuk
                    card.className = 'driver-card'; 
                    card.style.borderLeftColor = `#${driver.team_color}`;
                    
                    card.innerHTML = `
                        <h2 class="driver-name">
                            ${driver.driver_code} 
                            <span class="driver-number">#${driver.driver_number}</span>
                        </h2>
                        <p class="team-name">${driver.team_name}</p>
                    `;
                    
                    driverBoard.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                driverBoard.innerHTML = '<p>Gagal memuat data dari API. Pastikan server Flask menyala.</p>';
            });
    </script>
    
    <section class="telemetry-section">
        <h2>Telemetry Data (GP Bahrain 2024)</h2>
        <figure class="chart-container">
            <canvas id="telemetryChart"></canvas>
            <figcaption>Grafik lap tercepat Lewis Hamilton GP Bahrain 2024</figcaption>
        </figure>
    </section>
    <script>
    // 1. Tentukan URL API dan ambil kanvasnya
    const telemetryUrl = 'http://127.0.0.1:5000/api/telemetry';
    const telemetryCtx = document.getElementById('telemetryChart').getContext('2d');

    // 2. Telepon API Flask pakai fetch()
    fetch(telemetryUrl)
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                
                // 3. Pisahkan data seperti yang sudah kamu buat
                const distances = data.data.map(item => Math.round(item.Distance));
                const speeds = data.data.map(item => item.Speed);
                const throttles = data.data.map(item => item.Throttle);
                const RPM = data.data.map(item => item.RPM);
                const brake = data.data.map(item => item.Brake);
                
                // PENTING: Gunakan backtick (`) dan pastikan nama kolom persis dari database
                const teamColor = `#${data.data[0].team_color}`;

                // 4. Masukkan semuanya ke dalam cetakan Chart.js
                new Chart(telemetryCtx, {
                    type: 'line',
                    data: {
                        labels: distances,
                        datasets: [
                            {
                                label: 'Speed (km/h)',
                                data: speeds,
                                borderColor: teamColor,
                                yAxisID: 'y', // Nyambung ke sumbu Y kiri
                                pointRadius: 0, // Matikan titik agar tidak ngelag
                                borderWidth: 2
                            },
                            {
                                label: 'Throttle (%)',
                                data: throttles,
                                borderColor: '#00ff00',
                                yAxisID: 'y1', // Nyambung ke sumbu Y kanan
                                pointRadius: 0,
                                borderWidth: 1
                            },
                            {
                                label: 'RPM',
                                data: RPM,
                                borderColor: '#ff0000',
                                yAxisID: 'y2',
                                pointRadius: 0,
                                borderWidth: 1
                            },
                            {
                                label: 'Brake (%)',
                                data: brake,
                                borderColor: '#0000ff',
                                yAxisID: 'y3',
                                pointRadius: 0,
                                borderWidth: 1
                            }
                        ]
                    },
                    options: { // 5. scales harus dibungkus oleh options!
                        responsive: true,
                        scales: {
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                title: { display: true, text: 'Speed (km/h)', color: '#ffffff' },
                                ticks: { color: '#a0a0b5' }
                            }, // Jangan lupa koma di sini!
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                min: 0,
                                max: 100,
                                title: { display: true, text: 'Throttle (%)', color: '#00ff00' },
                                ticks: { color: '#00ff00' },
                                grid: { drawOnChartArea: false }
                            }, // Jangan lupa koma di sini!
                            x: {
                                title: { display: true, text: 'Distance (m)', color: '#ffffff' },
                                ticks: { color: '#a0a0b5' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }
        })
        .catch(error => console.error('Error memuat telemetry:', error));
</script>
        

</body>
</html>
